<mat-card class="post-card" appearance="outlined">
  <mat-card-header>
    <div class="avatar" mat-card-avatar aria-hidden="true">
      @if (post().author.avatarUrl) {
      <img [src]="post().author.avatarUrl" alt="" />
      } @else {
      <span>{{ post().author.firstName.charAt(0) }}{{ post().author.lastName.charAt(0) }}</span>
      }
    </div>

    <mat-card-title>
      <a class="author-link" [routerLink]="['/users', post().author.id]">{{ authorName() }}</a>
    </mat-card-title>
    <mat-card-subtitle>{{ post().createdAt }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p class="post-text">{{ post().text }}</p>

    @if (post().imageUrl) {
    <img class="post-image" [src]="post().imageUrl" [alt]="'Immagine del post di ' + authorName()" />
    }
  </mat-card-content>

  <mat-card-actions align="end">
    <span class="likes-count" [attr.aria-label]="post().likesCount + ' like'">
      {{ post().likesCount }} like
    </span>

    <button
      mat-button
      type="button"
      class="post-action"
      (click)="toggleLike()"
      [disabled]="busy()"
      [attr.aria-label]="post().isLiked ? 'Togli mi piace' : 'Metti mi piace'"
      [attr.aria-pressed]="post().isLiked"
    >
      <span class="like-icon" aria-hidden="true">{{ post().isLiked ? '♥' : '♡' }}</span>
    </button>

    @if (canRemove()) {
    <button
      mat-button
      type="button"
      class="post-action danger-action"
      (click)="removePost()"
      [disabled]="busy()"
    >
      Elimina
    </button>
    }
  </mat-card-actions>
</mat-card>
