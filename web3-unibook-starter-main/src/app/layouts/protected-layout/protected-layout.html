<div class="app-shell">
  <mat-toolbar class="app-header">
    <a class="brand" routerLink="/home" aria-label="Vai alla home">
      <img class="brand-logo" src="/login-logo.png" alt="" aria-hidden="true" />
      <span>Looply</span>
    </a>

    <nav class="app-nav" aria-label="Navigazione principale">
      <a
        mat-flat-button
        routerLink="/posts/new"
        routerLinkActive="create-link--active"
        class="create-link"
        aria-label="Pubblica un nuovo post"
      >
        +
      </a>

      <a mat-button routerLink="/home" routerLinkActive="nav-link--active" class="nav-link">
        Home
      </a>

      <a mat-button routerLink="/profile" routerLinkActive="nav-link--active" class="nav-link">
        Profilo
      </a>

      <a mat-button routerLink="/users/search" routerLinkActive="nav-link--active" class="nav-link">
        Cerca
      </a>

      @if (currentUser(); as user) {
      <a routerLink="/profile" class="user-chip" aria-label="Vai al tuo profilo">
        {{ user.firstName }} {{ user.lastName }}
      </a>
      }

      <button mat-flat-button type="button" class="logout-button" (click)="logout()">
        Logout
      </button>
    </nav>
  </mat-toolbar>

  <main class="app-main">
    <router-outlet />
  </main>
</div>
